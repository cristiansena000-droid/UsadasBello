{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editar moto</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f3f4f6;
            color:#111827;
        }

        /* TOPBAR */

        .topbar{

            width:100%;

            height:80px;

            background:white;

            display:flex;

            justify-content:space-between;

            align-items:center;

            padding:0 50px;

            border-bottom:1px solid #e5e7eb;
        }

        .logo{

            font-size:24px;

            font-weight:bold;
        }

        .btn-volver{

            background:#f3f4f6;

            padding:12px 20px;

            border-radius:10px;

            text-decoration:none;

            color:#111827;

            border:1px solid #d1d5db;
        }

        /* CONTENIDO */

        .contenido{

            width:100%;

            display:flex;

            justify-content:center;

            padding:50px 20px;
        }

        /* PANEL */

        .panel{

            width:100%;

            max-width:900px;

            background:white;

            border-radius:22px;

            padding:40px;

            border:1px solid #e5e7eb;
        }

        .panel h1{

            font-size:32px;

            margin-bottom:10px;
        }

        .panel p{

            color:#6b7280;

            margin-bottom:35px;
        }

        /* FORMULARIO */

        .formulario{

            display:grid;

            grid-template-columns:1fr 1fr;

            gap:25px;
        }

        .grupo{

            display:flex;

            flex-direction:column;
        }

        .grupo label{

            margin-bottom:8px;

            font-size:14px;

            font-weight:bold;
        }

        .grupo input,
        .grupo textarea{

            padding:14px;

            border-radius:12px;

            border:1px solid #d1d5db;

            font-size:15px;

            outline:none;
        }

        .grupo textarea{

            resize:none;

            height:130px;
        }

        .grupo-full{

            grid-column:1/3;
        }

        /* IMAGEN */

        .preview{

            width:100%;

            max-width:320px;

            border-radius:18px;

            margin-top:10px;

            border:1px solid #e5e7eb;
        }

        /* BOTON */

        .acciones{

            grid-column:1/3;

            display:flex;

            justify-content:flex-end;

            margin-top:10px;
        }

        .btn-guardar{

            background:#111827;

            color:white;

            border:none;

            padding:15px 28px;

            border-radius:12px;

            cursor:pointer;

            font-size:15px;
        }

        /* RESPONSIVE */

        @media(max-width:800px){

            .formulario{

                grid-template-columns:1fr;
            }

            .grupo-full,
            .acciones{

                grid-column:auto;
            }

        }

    </style>

</head>

<body>

    <!-- TOPBAR -->

    <header class="topbar">

        <div class="logo">
            UsadasBello
        </div>

        <a href="/panel/" class="btn-volver">
            Volver al panel
        </a>

    </header>

    <!-- CONTENIDO -->

    <main class="contenido">

        <section class="panel">

            <h1>
                Editar moto
            </h1>

            <p>
                Actualiza la información de la moto seleccionada.
            </p>

            <form method="POST" enctype="multipart/form-data" class="formulario">

                {% csrf_token %}

                <div class="grupo">

                    <label>
                        Marca
                    </label>

                    <input 
                        type="text"
                        name="marca"
                        value="{{ moto.marca }}"
                    >

                </div>

                <!-- LINEA -->

<div class="grupo">

    <label>
        Línea
    </label>

    <input 
        type="text"
        name="linea"
        value="{{ moto.linea }}"
    >

</div>

<!-- MODELO -->

<div class="grupo">

    <label>
        Modelo (año)
    </label>

    <input 
        type="number"
        name="modelo"
        value="{{ moto.modelo }}"
    >

</div>


<!-- PLACA -->

<div class="grupo">

    <label>
        Placa
    </label>

    <input 
        type="text"
        name="placa"
        value="{{ moto.placa }}"
    >

</div>

                <div class="grupo">

                    <label>
                        Precio
                    </label>

                    <input 
                        type="number"
                        name="precio"
                        value="{{ moto.precio }}"
                    >

                </div>

                <div class="grupo">

                    <label>
                        Cilindraje
                    </label>

                    <input 
                        type="number"
                        name="cilindraje"
                        value="{{ moto.cilindraje }}"
                    >

                </div>

                <div class="grupo">

                    <label>
                        Kilometraje
                    </label>

                    <input 
                        type="number"
                        name="kilometraje"
                        value="{{ moto.kilometraje }}"
                    >

                </div>

                <div class="grupo">

                    <label>
                        Nueva imagen
                    </label>

                    <input 
                        type="file"
                        name="imagen"
                    >

                    <img 
                        src="{{ moto.imagen.url }}"
                        class="preview"
                    >

                </div>
                <div class="grupo">

    <label>
        Estado
    </label>

    <select name="estado">

        <option value="publicada"
        {% if moto.estado == "publicada" %}selected{% endif %}>
            Publicada
        </option>

        <option value="pendiente"
        {% if moto.estado == "pendiente" %}selected{% endif %}>
            Pendiente
        </option>

        <option value="vendida"
        {% if moto.estado == "vendida" %}selected{% endif %}>
            Vendida
        </option>

    </select>

</div>

                <div class="grupo grupo-full">

                    <label>
                        Descripción
                    </label>

                    <textarea name="descripcion">{{ moto.descripcion }}</textarea>

                </div>
                <div class="grupo">

    <label>
        SOAT
    </label>

    <input 
        type="text"
        name="soat"
        value="{{ moto.soat }}"
    >

</div>

<div class="grupo">

    <label>
        Tecnomecánica
    </label>

    <input 
        type="text"
        name="tecnomecanica"
        value="{{ moto.tecnomecanica }}"
    >

</div>

<div class="grupo">

    <label>
        Tránsito
    </label>

    <input 
        type="text"
        name="transito"
        value="{{ moto.transito }}"
    >

</div>

                <div class="acciones">

                    <button type="submit" class="btn-guardar">
                        Guardar cambios
                    </button>

                </div>

            </form>

        </section>

    </main>

</body>

</html>
