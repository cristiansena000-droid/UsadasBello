<h2>Ingresa el código</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="codigo" placeholder="Código">
    <button type="submit">Verificar</button>
</form>

{% if error %}
<p>{{ error }}</p>
{% endif %}

{% if codigo_debug %}
<p>Tu código es: {{ codigo_debug }}</p>
{% endif %}
